name: Export ONNX Models to HuggingFace

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers onnx onnxruntime huggingface_hub
          pip install -e .

      - name: Export ONNX models
        run: |
          python -m omnivoice.scripts.export_onnx \
            --model_path k2-fsa/OmniVoice \
            --output_dir ./onnx_out \
            --device cpu
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload to HuggingFace Hub
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "lanmower/OmniVoice-ONNX"
          api.create_repo(repo_id=repo_id, repo_type="model", exist_ok=True)
          api.upload_folder(
              folder_path="./onnx_out",
              repo_id=repo_id,
              repo_type="model",
          )
          print(f"Uploaded to https://huggingface.co/{repo_id}")
          EOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
